---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |-
    kubeProxyReplacement: true
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 6443
    cni:
      chainingMode: "none"
    operator:
      replicas: 1
    gatewayAPI:
      enabled: true
    routingMode: native
    ipv4NativeRoutingCIDR: 10.128.0.0/16
    autoDirectNodeRoutes: true
    
    cluster:
      name: cluster1
      id: 1

    clustermesh:
      config:
        enabled: true
      useAPIServer: true
      maxConnectedClusters: 255
      apiServer:
        service:
          type: NodePort
###
