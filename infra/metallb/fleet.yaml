---
defaultNamespace: metallb-system

labels:
  fleet-bundle: metallb

helm:
  chart: metallb
  repo: https://metallb.github.io/metallb
  version: 0.16.0
  releaseName: metallb
  takeOwnership: false
  values:
    frr-k8s:
      prometheus:
        serviceMonitor:
          enabled: false

overrideTargets:
  - clusterGroupSelector:
      matchLabels:
        metallb: enabled

### 
