---
defaultNamespace: garage

labels:
  fleet-bundle: garage

helm:
  chart: oci://registry-1.docker.io/flrichar/garage
  version: 0.9.2
  releaseName: garage
  takeOwnership: false
  valuesFrom:
    - configMapKeyRef:
        name: garage-values
        key: values.yaml

overrideTargets:
  - clusterGroupSelector:
      matchLabels:
        flrichar.garage: enabled

###
